<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bosbeelden Scoringstool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2eb;
  --surface: #faf8f4;
  --surface2: #eeeae0;
  --border: #d8d2c4;
  --border-soft: #e8e3d8;
  --text: #1a1814;
  --text-muted: #6b6558;
  --text-faint: #a09890;
  --accent: #2d5a27;
  --accent-light: #e8f0e6;
  --accent-border: #b8d4b4;
  --warn: #7a3a1a;
  --warn-light: #f5ede6;
  --warn-border: #d4b4a0;
  --amber: #8a5e1a;
  --amber-light: #f5f0e4;
  --amber-border: #d4c490;
  --mono: 'DM Mono', monospace;
  --serif: 'Fraunces', Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.6;
}

/* UPLOAD SCREEN */
#upload-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.logo {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  text-align: center;
}

.logo em {
  font-style: italic;
  color: var(--accent);
}

.tagline {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 3rem;
  text-align: center;
}

.upload-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2.5rem;
  max-width: 480px;
  width: 100%;
  text-align: center;
}

.upload-zone {
  border: 1.5px dashed var(--border);
  border-radius: 4px;
  padding: 2.5rem 1.5rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 1.5rem;
}

.upload-zone:hover {
  border-color: var(--accent);
  background: var(--accent-light);
}

.upload-zone .icon {
  font-size: 32px;
  display: block;
  margin-bottom: 12px;
  opacity: 0.5;
}

.upload-btn {
  display: inline-block;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 3px;
  padding: 10px 28px;
  font-family: var(--mono);
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.02em;
  margin-bottom: 8px;
}

.upload-btn:hover { opacity: 0.85; }

.upload-zone p {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 8px;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  text-align: left;
}

.info-item {
  background: var(--surface2);
  border-radius: 3px;
  padding: 10px 12px;
}

.info-item .num {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--accent);
  display: block;
}

.info-item .lbl {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* APP LAYOUT */
#app-screen {
  display: none;
  height: 100vh;
  flex-direction: column;
}

.topbar {
  height: 48px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  flex-shrink: 0;
}

.topbar-title {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 300;
  font-style: italic;
  color: var(--text);
  margin-right: 8px;
}

.topbar-stats {
  display: flex;
  gap: 8px;
  flex: 1;
}

.pill {
  background: var(--surface2);
  border: 1px solid var(--border-soft);
  border-radius: 99px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--text-muted);
}

.pill strong {
  color: var(--text);
  font-weight: 500;
}

.topbar-actions { display: flex; gap: 8px; }

.top-btn {
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 3px;
  padding: 6px 14px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  color: var(--text-muted);
}

.top-btn:hover { background: var(--surface2); color: var(--text); }

.top-btn.primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.top-btn.primary:hover { opacity: 0.85; }

/* BODY LAYOUT */
.body-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-head {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sidebar-head span {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
}

.add-more {
  font-size: 11px;
  color: var(--accent);
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--mono);
  padding: 0;
}

.img-list {
  flex: 1;
  overflow-y: auto;
}

.img-list::-webkit-scrollbar { width: 4px; }
.img-list::-webkit-scrollbar-track { background: transparent; }
.img-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.img-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-soft);
  transition: background 0.1s;
}

.img-item:hover { background: var(--surface2); }
.img-item.active { background: var(--accent-light); border-left: 2px solid var(--accent); padding-left: 10px; }

.thumb {
  width: 38px;
  height: 38px;
  object-fit: cover;
  border-radius: 2px;
  flex-shrink: 0;
  border: 1px solid var(--border-soft);
}

.item-info { min-width: 0; flex: 1; }
.item-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.item-badge {
  display: inline-block;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 99px;
  margin-top: 2px;
  letter-spacing: 0.03em;
}

.badge-done { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); }
.badge-partial { background: var(--amber-light); color: var(--amber); border: 1px solid var(--amber-border); }
.badge-empty { background: var(--surface2); color: var(--text-faint); border: 1px solid var(--border-soft); }

/* MAIN PANEL */
.main-panel {
  flex: 1;
  overflow: hidden;
  padding: 0;
  background: var(--bg);
  display: flex;
}

.empty-msg {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
  gap: 8px;
  font-size: 13px;
}

.empty-msg .arrow { font-size: 28px; opacity: 0.3; }

/* SCORING AREA */
.score-layout {
  display: flex;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.image-col {
  flex: 1;
  padding: 16px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow: hidden;
  min-width: 0;
}

.preview-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.preview-img {
  width: 100%;
  flex: 1;
  object-fit: contain;
  display: block;
  background: var(--surface2);
  min-height: 0;
}

.img-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-top: 1px solid var(--border-soft);
  background: var(--surface);
}

.img-nav-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
}

.img-nav-counter { font-size: 11px; color: var(--text-faint); }

.nav-arrows { display: flex; gap: 6px; }

.arrow-btn {
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 2px;
  padding: 4px 11px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  color: var(--text-muted);
}

.arrow-btn:hover { background: var(--surface2); }
.arrow-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* REALISM INDICATOR */
.realism-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.realism-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-soft);
}

.realism-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}

.realism-code {
  font-size: 10px;
  color: var(--text-faint);
  background: var(--surface2);
  padding: 2px 7px;
  border-radius: 99px;
}

.realism-body { padding: 8px 12px; }

.realism-desc {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 8px;
  line-height: 1.4;
}

.realism-btns { display: flex; gap: 8px; }

.real-btn {
  flex: 1;
  padding: 10px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  transition: none;
  border: 1.5px solid transparent;
}

.real-btn-0 {
  background: var(--warn-light);
  border-color: var(--warn-border);
  color: var(--warn);
}

.real-btn-0.active, .real-btn-0:hover {
  background: #d4846a;
  color: white;
  border-color: #d4846a;
}

.real-btn-1 {
  background: var(--accent-light);
  border-color: var(--accent-border);
  color: var(--accent);
}

.real-btn-1.active, .real-btn-1:hover {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.real-sub {
  display: block;
  font-size: 10px;
  font-weight: 400;
  margin-top: 3px;
  opacity: 0.75;
}

/* NOTES */
.notes-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.notes-head {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-soft);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
}

.notes-field {
  width: 100%;
  border: none;
  background: var(--surface);
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  resize: none;
  height: 52px;
  outline: none;
}

.notes-field::placeholder { color: var(--text-faint); }

/* SCORE COL */
.score-col {
  width: 320px;
  flex-shrink: 0;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  height: 100%;
}
.score-col::-webkit-scrollbar { width: 4px; }
.score-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.group-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.group-head {
  padding: 7px 12px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border-soft);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  font-weight: 500;
}

.indicator-row {
  padding: 11px 12px;
  border-bottom: 1px solid var(--border-soft);
}

.indicator-row:last-child { border-bottom: none; }

.ind-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 3px;
}

.ind-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
}

.ind-code {
  font-size: 10px;
  color: var(--text-faint);
}

.ind-desc {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 9px;
  line-height: 1.5;
}

.score-btns {
  display: flex;
  gap: 5px;
}

.sc-btn {
  flex: 1;
  padding: 7px 3px;
  border-radius: 2px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  border: 1.5px solid var(--border-soft);
  background: var(--surface2);
  color: var(--text-muted);
  transition: none;
}

.sc-btn:hover { border-color: var(--border); color: var(--text); }

.sc-btn.sel-0 { background: #f5ede6; color: #7a3a1a; border-color: #d4a090; }
.sc-btn.sel-1 { background: #f5f0e4; color: #7a5e1a; border-color: #d4c490; }
.sc-btn.sel-2 { background: #eaf3e6; color: #3a6a2a; border-color: #b4d4b0; }
.sc-btn.sel-3 { background: #e0f0e8; color: #1a6a4a; border-color: #90c4a8; }

.sc-sub {
  display: block;
  font-size: 9px;
  font-weight: 400;
  margin-top: 2px;
  opacity: 0.7;
}

/* TOTAL */
.total-card {
  background: var(--accent-light);
  border: 1px solid var(--accent-border);
  border-radius: 3px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.total-num-wrap {}
.total-num {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 300;
  color: var(--accent);
  line-height: 1;
}

.total-denom { font-size: 13px; color: var(--text-muted); }

.total-bar-wrap { flex: 1; }
.total-bar-label { font-size: 10px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
.total-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.total-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.2s; }

.save-row { display: flex; gap: 8px; }

.save-btn {
  flex: 1;
  padding: 9px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  color: var(--text-muted);
}

.save-btn:hover { background: var(--surface2); color: var(--text); }
.save-btn.saved { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* PROGRESS MODAL */
.progress-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,24,20,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.progress-overlay.show { display: flex; }

.progress-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1.5rem;
  width: 360px;
  max-height: 80vh;
  overflow-y: auto;
}

.progress-title {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 300;
  margin-bottom: 1rem;
}

.progress-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border-soft);
  font-size: 11px;
}

.progress-item:last-child { border: none; }

.close-btn {
  margin-top: 1rem;
  width: 100%;
  padding: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  color: var(--text);
}
</style>
</head>
<body>

<!-- UPLOAD SCREEN -->
<div id="upload-screen">
  <div class="logo">Bos<em>beelden</em></div>
  <div class="tagline">Scoringstool — Bachelorproef 2025–26</div>
  <div class="upload-card">
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <span class="icon">&#x1F332;</span>
      <button class="upload-btn">Kies afbeeldingen</button>
      <p>Selecteer alle beelden tegelijk &mdash; PNG, JPG of WEBP</p>
    </div>
    <div class="info-grid">
      <div class="info-item"><span class="num">7</span><span class="lbl">Indicatoren</span></div>
      <div class="info-item"><span class="num">0–3</span><span class="lbl">Schaal (A–C)</span></div>
      <div class="info-item"><span class="num">CSV</span><span class="lbl">Export</span></div>
    </div>
  </div>
  <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="loadImages(this)">
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="topbar">
    <span class="topbar-title">Bosbeelden</span>
    <div class="topbar-stats">
      <span class="pill">Geladen: <strong id="stat-total">0</strong></span>
      <span class="pill">Gescoord: <strong id="stat-done">0</strong></span>
      <span class="pill">Resterend: <strong id="stat-left">0</strong></span>
    </div>
    <div class="topbar-actions">
      <button class="top-btn" onclick="showProgress()">Voortgang</button>
      <button class="top-btn" onclick="document.getElementById('file-input2').click()">+ Toevoegen</button>
      <button class="top-btn primary" onclick="exportCSV()">&#8595; Export CSV</button>
    </div>
  </div>

  <div class="body-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-head">
        <span id="sidebar-count">0 beelden</span>
        <button class="add-more" onclick="document.getElementById('file-input2').click()">+ meer</button>
      </div>
      <div class="img-list" id="img-list"></div>
    </div>

    <!-- MAIN PANEL -->
    <div class="main-panel" id="main-panel">
      <div class="empty-msg" style="flex:1">
        <div class="arrow">&#8592;</div>
        <div>Kies een beeld links om te beginnen</div>
      </div>
    </div>
  </div>
</div>

<!-- Progress modal -->
<div class="progress-overlay" id="progress-overlay" onclick="if(event.target===this)closeProgress()">
  <div class="progress-modal">
    <div class="progress-title">Voortgang</div>
    <div id="progress-list"></div>
    <button class="close-btn" onclick="closeProgress()">Sluiten</button>
  </div>
</div>

<input type="file" id="file-input2" multiple accept="image/*" style="display:none" onchange="loadImages(this)">

<script>
const INDICATORS = [
  {
    group: "A — Structurele heterogeniteit",
    items: [
      { code: "A1", name: "Structurele maturiteit", desc: "Stamdiameter-variatie en grote/oude bomen" },
      { code: "A2", name: "Verticale gelaagdheid", desc: "Struik- en kruidlaag naast kanopij" },
      { code: "A3", name: "Ruimtelijke regelmaat", desc: "Rechte rijen (0) vs. volledig onregelmatig (3)" },
      { code: "A4", name: "Kroonbedekking / gaten", desc: "Uniforme gesloten kroon (0) vs. meerdere gaten (3)" }
    ]
  },
  {
    group: "B — Soortensamenstelling",
    items: [
      { code: "B1", name: "Boomsoortendiversiteit", desc: "Monospecifiek (0) vs. 3+ herkenbare soorten (3)" }
    ]
  },
  {
    group: "C — Dood hout",
    items: [
      { code: "C1", name: "Dood hout", desc: "Geen dood hout (0) vs. meerdere vormen en stadia (3)" }
    ]
  }
];

const SCALE_LABELS = ["Sterk prod.", "Licht prod.", "Licht eco.", "Sterk eco."];

let images = [];
let scores = {};
let currentIdx = -1;

function loadImages(input) {
  const files = Array.from(input.files);
  let added = 0;
  files.forEach(f => {
    if (images.find(i => i.name === f.name)) return;
    images.push({ name: f.name, url: URL.createObjectURL(f) });
    scores[f.name] = scores[f.name] || { vals: {}, realism: null, notes: "" };
    added++;
  });
  images.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
  input.value = "";
  renderSidebar();
  updateStats();
  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('app-screen').style.flexDirection = 'column';
  if (currentIdx === -1 && images.length > 0) selectImage(0);
}

function countFilled(name) {
  const s = scores[name];
  const ind = Object.keys(s.vals).length;
  const r = s.realism !== null ? 1 : 0;
  return ind + r;
}

function isScoredFully(name) {
  return countFilled(name) === 7;
}

function calcTotal(name) {
  return Object.values(scores[name].vals).reduce((a, b) => a + b, 0);
}

function renderSidebar() {
  const list = document.getElementById('img-list');
  list.innerHTML = '';
  images.forEach((img, i) => {
    const filled = countFilled(img.name);
    const done = isScoredFully(img.name);
    const partial = !done && filled > 0;

    const div = document.createElement('div');
    div.className = 'img-item' + (i === currentIdx ? ' active' : '');
    div.onclick = () => selectImage(i);

    let badgeClass = 'badge-empty';
    let badgeText = `${filled}/7`;
    if (done) { badgeClass = 'badge-done'; badgeText = `✓ ${calcTotal(img.name)}/18`; }
    else if (partial) { badgeClass = 'badge-partial'; }

    div.innerHTML = `
      <img class="thumb" src="${img.url}" alt="">
      <div class="item-info">
        <div class="item-name">${img.name}</div>
        <span class="item-badge ${badgeClass}">${badgeText}</span>
      </div>`;
    list.appendChild(div);
  });
  document.getElementById('sidebar-count').textContent = images.length + ' beelden';
}

function updateStats() {
  const total = images.length;
  const done = images.filter(img => isScoredFully(img.name)).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-left').textContent = total - done;
}

function selectImage(idx) {
  if (idx < 0 || idx >= images.length) return;
  currentIdx = idx;
  renderSidebar();

  // Scroll sidebar item into view
  const items = document.querySelectorAll('.img-item');
  if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });

  const img = images[idx];
  const s = scores[img.name];
  const panel = document.getElementById('main-panel');

  // Build score col HTML
  let scoreColHTML = '';
  INDICATORS.forEach(group => {
    scoreColHTML += `<div class="group-card">
      <div class="group-head">${group.group}</div>`;
    group.items.forEach(ind => {
      scoreColHTML += `<div class="indicator-row">
        <div class="ind-header">
          <span class="ind-name">${ind.name}</span>
          <span class="ind-code">${ind.code}</span>
        </div>
        <div class="ind-desc">${ind.desc}</div>
        <div class="score-btns">`;
      [0, 1, 2, 3].forEach(v => {
        const sel = s.vals[ind.code] === v ? ` sel-${v}` : '';
        scoreColHTML += `<button class="sc-btn${sel}" onclick="setScore('${img.name}','${ind.code}',${v})">
          ${v}<span class="sc-sub">${SCALE_LABELS[v]}</span>
        </button>`;
      });
      scoreColHTML += `</div></div>`;
    });
    scoreColHTML += `</div>`;
  });

  const total = calcTotal(img.name);
  const pct = Math.round((total / 18) * 100);

  scoreColHTML += `
    <div class="total-card">
      <div class="total-num-wrap">
        <span class="total-num">${total}</span>
        <span class="total-denom"> / 18</span>
      </div>
      <div class="total-bar-wrap">
        <div class="total-bar-label">Ecologische score</div>
        <div class="total-track"><div class="total-fill" id="total-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="save-row">
      <button class="save-btn" onclick="saveAndNext()">Opslaan &amp; volgende &#8594;</button>
    </div>`;

  // Realism buttons
  const r0sel = s.realism === 0 ? ' active' : '';
  const r1sel = s.realism === 1 ? ' active' : '';

  panel.innerHTML = `
    <div class="score-layout">
      <div class="image-col">
        <div class="preview-wrap">
          <img class="preview-img" src="${img.url}" alt="${img.name}">
          <div class="img-nav">
            <div>
              <div class="img-nav-name">${img.name}</div>
              <div class="img-nav-counter">${idx + 1} / ${images.length}</div>
            </div>
            <div class="nav-arrows">
              <button class="arrow-btn" onclick="selectImage(${idx - 1})" ${idx === 0 ? 'disabled' : ''}>&#8592;</button>
              <button class="arrow-btn" onclick="selectImage(${idx + 1})" ${idx === images.length - 1 ? 'disabled' : ''}>&#8594;</button>
            </div>
          </div>
        </div>

        <div class="realism-card">
          <div class="realism-head">
            <span class="realism-label">R1 — Realisme</span>
            <span class="realism-code">binair 0/1</span>
          </div>
          <div class="realism-body">
            <div class="realism-desc">Is dit beeld een realistische weergave van een bos, of is het abstract / geschilderd / schematisch?</div>
            <div class="realism-btns">
              <button class="real-btn real-btn-0${r0sel}" onclick="setRealism('${img.name}', 0)">
                0 <span class="real-sub">Abstract / onrealistisch</span>
              </button>
              <button class="real-btn real-btn-1${r1sel}" onclick="setRealism('${img.name}', 1)">
                1 <span class="real-sub">Realistisch</span>
              </button>
            </div>
          </div>
        </div>

        <div class="notes-card">
          <div class="notes-head">Opmerkingen</div>
          <textarea class="notes-field" placeholder="Bijv. fauna aanwezig, romantisering, geografische context, bijzonderheden..." oninput="scores['${img.name}'].notes = this.value">${s.notes}</textarea>
        </div>
      </div>

      <div class="score-col">${scoreColHTML}</div>
    </div>`;
}

function setScore(name, code, val) {
  scores[name].vals[code] = val;
  selectImage(currentIdx);
  updateStats();
}

function setRealism(name, val) {
  scores[name].realism = val;
  selectImage(currentIdx);
  updateStats();
}

function saveAndNext() {
  if (currentIdx < images.length - 1) selectImage(currentIdx + 1);
}

function getPromptGroup(name) {
  const n = name.toLowerCase();
  if (/p1[_\-]|prompt[_\-]?1[_\-]/.test(n)) return 'A forest - met revisie';
  if (/p2[_\-]|prompt[_\-]?2[_\-]/.test(n)) return 'A forest - zonder revisie';
  if (/p3[_\-]|prompt[_\-]?3[_\-]/.test(n)) return 'A planted forest - met revisie';
  if (/p4[_\-]|prompt[_\-]?4[_\-]/.test(n)) return 'A planted forest - zonder revisie';
  if (/p5[_\-]|prompt[_\-]?5[_\-]/.test(n)) return 'An old forest - met revisie';
  if (/p6[_\-]|prompt[_\-]?6[_\-]/.test(n)) return 'An old forest - zonder revisie';
  return '';
}

function exportCSV() {
  const allCodes = ['A1', 'A2', 'A3', 'A4', 'B1', 'C1'];
  let csv = 'bestandsnaam,promptgroep,' + allCodes.join(',') + ',totaal_ecologisch,R1_realisme,opmerkingen\n';
  images.forEach(img => {
    const s = scores[img.name];
    const vals = allCodes.map(c => s.vals[c] !== undefined ? s.vals[c] : '');
    const total = vals.every(v => v !== '') ? vals.reduce((a, b) => a + Number(b), 0) : '';
    const real = s.realism !== null ? s.realism : '';
    const note = (s.notes || '').replace(/"/g, '""').replace(/\n/g, ' ');
    const group = getPromptGroup(img.name);
    csv += `"${img.name}","${group}",${vals.join(',')},${total},${real},"${note}"\n`;
  });
  dl('bosbeelden_scores.csv', csv, 'text/csv;charset=utf-8;');
}

function dl(filename, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF' + content], { type }));
  a.download = filename;
  a.click();
}

function showProgress() {
  const list = document.getElementById('progress-list');
  list.innerHTML = '';
  images.forEach(img => {
    const done = isScoredFully(img.name);
    const filled = countFilled(img.name);
    const div = document.createElement('div');
    div.className = 'progress-item';
    div.innerHTML = `
      <span style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${img.name}</span>
      <span class="item-badge ${done ? 'badge-done' : filled > 0 ? 'badge-partial' : 'badge-empty'}">${done ? '✓ klaar' : filled + '/7'}</span>`;
    div.onclick = () => { closeProgress(); selectImage(images.indexOf(img)); };
    div.style.cursor = 'pointer';
    list.appendChild(div);
  });
  document.getElementById('progress-overlay').classList.add('show');
}

function closeProgress() {
  document.getElementById('progress-overlay').classList.remove('show');
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') selectImage(currentIdx + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') selectImage(currentIdx - 1);
  if (e.key >= '0' && e.key <= '3') {
    const focused = document.activeElement;
    if (!focused || focused.tagName === 'BODY') return;
  }
});
</script>
